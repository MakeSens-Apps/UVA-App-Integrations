AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'

Description: >
 Este microservicio se enfoca en integrar UVA con los otros servicios
 de MakeSens:
 1. DeviceDataAcces
 2. MakeSensCloud
 3. UserAPI (Connection)

 Arquitectura hexagonal: UNA sola Lambda HTTP (FastAPI + Mangum) sirve TODOS los
 endpoints HTTP (GET /{id_uva}/connection y POST /CreateRacimo). Las
 integraciones NO-HTTP (DynamoDB Stream -> Lambda) siguen como Lambdas separadas
 que comparten el mismo build (CodeUri: src).

Globals:
  Function:
    MemorySize: 520
    Runtime: python3.9
    Architectures:
        - x86_64
    Timeout: 600
Parameters:
  # Parametros de integración con DeviceDataAccess
  SNSTopicARN:
    Type: String
    Default: arn:aws:sns:us-east-1:913045965320:RealTimeDeviceData-develop
  TopicRegion:
    Type: String
    Default: us-east-1
  MeasurementDynamoDBStreamARN:
    Type: String
    Default: arn:aws:dynamodb:us-east-1:913045965320:table/Measurement-uqr6xntysfa3lbguhirvcj3pa4-develop/stream/2024-09-29T16:18:49.322
  # Parametro de app para el entorno
  AppId:
    Type: String
    Default: uqr6xntysfa3lbguhirvcj3pa4
  RacimoName:
    Type: String
    Default: RACIMO-uqr6xntysfa3lbguhirvcj3pa4-develop
  # Parametros de integración con Cloud
  UVADynamoDBStreamARN:
    Type: String
    Default: arn:aws:dynamodb:us-east-1:913045965320:table/UVA-uqr6xntysfa3lbguhirvcj3pa4-develop/stream/2024-11-06T21:41:10.661
  OrganizationName:
    Type: String
    Default: Organization-rtjffhw6ejhs7n5cxqjmxs6gzq-developer
  LocationName:
    Type: String
    Default: Location-rtjffhw6ejhs7n5cxqjmxs6gzq-developer
  CloudAppsyncUrl:
    Type: String
    Default: https://bnbto5gmgvcazhjsrxdsviyv74.appsync-api.us-east-1.amazonaws.com/graphql
  CloudApiKey:
    Type: String
    Default: da2-xxuxsrmjcrfcvetkb2wbvbe6sm
  # UserAPI (Connection)
  UvaAppsyncUrl:
    Type: String
    Default: https://swmmbj4xmfa5pelhgbljkxonuu.appsync-api.us-east-1.amazonaws.com/graphql
  UvaApiKey:
    Type: String
    Default: da2-ocpxiy4zsncszex4m7lepzxgnq

Resources:
  # ===========================================================================
  # NO-HTTP: DeviceDataAccess (Measurement DynamoDB Stream -> SNS)
  # Lambda separada (stream-triggered). Comparte el build src (CodeUri: src).
  # ===========================================================================
  DynamoDBEventProcessorFunction:
    Type: 'AWS::Serverless::Function'
    Properties:
      CodeUri: src
      Handler: lambda_handlers.event_ingestor_measurement_handler.handler
      Events:
        DynamoDBStreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !Ref MeasurementDynamoDBStreamARN
            StartingPosition: LATEST
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 10
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: "DynamoDBStreamAccess"
              Effect: Allow
              Action:
                - dynamodb:ListStreams
              Resource: '*'
            - Sid: "DynamoDBStreamSpecificAccess"
              Effect: Allow
              Action:
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:DescribeStream
              Resource: !Ref MeasurementDynamoDBStreamARN
            - Sid: "SNSPublishAccess"
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SNSTopicARN
      Environment:
        Variables:
          SNSTopicARN: !Ref SNSTopicARN

  # ===========================================================================
  # NO-HTTP: Cloud (UVA DynamoDB Stream -> MakeSens Cloud AppSync)
  # Lambda separada (stream-triggered). Comparte el build src (CodeUri: src).
  # ===========================================================================
  UvaToCloudFunction:
    Type: 'AWS::Serverless::Function'
    Properties:
      CodeUri: src
      Handler: lambda_handlers.event_ingestor_uva_handler.handler
      Events:
        DynamoDBStreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !Ref UVADynamoDBStreamARN
            StartingPosition: LATEST
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 10
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: "DynamoDBStreamAccess"
              Effect: Allow
              Action:
                - dynamodb:ListStreams
              Resource: '*'
            - Sid: "DynamoDBStreamSpecificAccess"
              Effect: Allow
              Action:
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:DescribeStream
              Resource: !Ref UVADynamoDBStreamARN
            - Sid: "DynamoDBReadAccess"
              Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:GetItem
              Resource:
                - Fn::Sub: arn:aws:dynamodb:us-east-1:913045965320:table/${RacimoName}
                - Fn::Sub: arn:aws:dynamodb:us-east-1:913045965320:table/${OrganizationName}
                - Fn::Sub: arn:aws:dynamodb:us-east-1:913045965320:table/${LocationName}
      Environment:
        Variables:
          RACIMOTable: !Ref RacimoName
          OrganizationTable: !Ref OrganizationName
          LocationTable: !Ref LocationName
          AppSyncURL: !Ref CloudAppsyncUrl
          ApiKey: !Ref CloudApiKey

  # ===========================================================================
  # HTTP: UNA sola Lambda (FastAPI + Mangum) que sirve TODOS los endpoints HTTP.
  # Logical ID mantenido como `UVALastConnection` para preservar el mapeo de
  # variables de entorno del harness e2e (--env-vars usa esta clave).
  #   GET  /{id_uva}/connection   (antes: UVALastConnection)
  #   POST /CreateRacimo          (antes: CreateRacimo)
  # ===========================================================================
  UVALastConnection:
    Type: 'AWS::Serverless::Function'
    Properties:
      CodeUri: src
      Handler: lambda_handlers.api_handler.handler
      Runtime: python3.9
      Timeout: 600
      Events:
        LastConnectionApiEvent:
          Type: Api
          Properties:
            Path: /{id_uva}/connection
            Method: GET
            Auth:
              Authorizer: AWS_IAM
        CreateRacimoApiEvent:
          Type: Api
          Properties:
            Path: /CreateRacimo
            Method: POST
            Auth:
              Authorizer: AWS_IAM
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: "AppSyncAccess"
              Effect: Allow
              Action:
                - appsync:GraphQL
              Resource: '*'
            - Sid: "AppSyncGraphQLAccess"
              Effect: Allow
              Action:
                - appsync:GraphQL
              Resource:
                - !Sub "arn:aws:appsync:us-east-1:913045965320:apis/${AppId}/types/Mutation/fields/createRACIMO"
                - !Sub "arn:aws:appsync:us-east-1:913045965320:apis/${AppId}/types/Query/fields/listRACIMOS"
      Environment:
        Variables:
          AppSyncURL: !Ref UvaAppsyncUrl
          ApiKey: !Ref UvaApiKey
